name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore TwoFactorAuth.sln

      - name: Build Core
        run: dotnet build src/TwoFactorAuth.Core/TwoFactorAuth.Core.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/TwoFactorAuth.Logic.Tests/TwoFactorAuth.Logic.Tests.csproj -c Release --no-restore --verbosity normal

      - name: Build Windows
        run: dotnet build src/TwoFactorAuth.Win/TwoFactorAuth.Win.csproj -c Release --no-restore
